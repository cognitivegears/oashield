
# addContact: POST /contact
# Skip this operation if the request does not match the operation path.
# Path parameter validation patterns are embedded in the regex, so this rule
# both routes and validates path parameters (works on ModSecurity3 and Coraza).
SecRule REQUEST_FILENAME "!@rx ^/contact$" "id:4200002,phase:2,pass,nolog,skipAfter:END_addContact"
# Skip this operation if the request method does not match the operation
SecRule REQUEST_METHOD "!@within POST" "id:4200003,phase:2,pass,nolog,skipAfter:END_addContact"


# Reject unknown parameters: ARGS_NAMES holds query, form, and flattened JSON body
# names on both engines, so one allowlist covers them all.
SecRule ARGS_NAMES "!@rx ^(?:json\.name|json\.id|json\.contactMethod|json\.contactMethod\.email|json\.contactMethod\.phone)$" "id:4200014,phase:2,block,msg:'Unknown parameter detected',log,auditlog,skipAfter:FAILED_API_CHECKS"

# Handle request bodies by declared media type
SecRule REQUEST_HEADERS:Content-Type "!@rx ^application/json" "id:4210001,phase:2,pass,nolog,skipAfter:ENDMEDIA_addContact_0"
# ModSecurity3 flags unparseable bodies here; Coraza does not set REQBODY_ERROR,
# but its @validateSchema rule below rejects malformed JSON instead.
SecRule REQBODY_ERROR "!@eq 0" "id:4210002,phase:2,block,msg:'Failed to parse request body',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecRule &ARGS:json.name "@eq 0" "id:4210005,phase:2,block,msg:'Missing required property json.name',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecRule ARGS:json.name "!@rx ^.+$" "id:4210006,phase:2,block,msg:'Invalid value for property json.name',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecRule ARGS:json.id "!@rx ^(?:[0-9]{1,19}|[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})$" "id:4210018,phase:2,block,msg:'Invalid value for property json.id',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecRule ARGS:json.contactMethod.email "!@rx ^([A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,})$" "id:4210030,phase:2,block,msg:'Invalid value for property json.contactMethod.email',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecRule ARGS:json.contactMethod.phone "!@rx ^[0-9]{10}$" "id:4210042,phase:2,block,msg:'Invalid value for property json.contactMethod.phone',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecAction "id:4210004,phase:2,pass,nolog,skipAfter:AFTER_CONSUMES_addContact"

SecMarker ENDMEDIA_addContact_0


# Declared consumes exist but the request Content-Type matched none of them
SecAction "id:4200021,log,auditlog,block,phase:2,msg:'Unexpected content type'"


SecMarker AFTER_CONSUMES_addContact

## The request passed all checks
SecAction "phase:2,allow:request,id:4200022"

## End of checks for this operation
SecMarker END_addContact

