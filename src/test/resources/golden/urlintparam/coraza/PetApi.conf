# ModSecurity3 flags unparseable bodies here; Coraza does not set REQBODY_ERROR,
# but its @validateSchema rule below rejects malformed JSON instead.
SecRule REQBODY_ERROR "!@eq 0" "id:4200017,phase:2,block,msg:'Failed to parse request body',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecRule ARGS:json.id "!@rx ^[0-9]{1,19}$" "id:4210002,phase:2,block,msg:'Invalid value for property json.id',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecRule ARGS:json.category.id "!@rx ^[0-9]{1,19}$" "id:4210014,phase:2,block,msg:'Invalid value for property json.category.id',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecRule ARGS:json.category.name "!@rx ^[a-zA-Z0-9]+[a-zA-Z0-9\.\-_]*[a-zA-Z0-9]+$" "id:4210026,phase:2,block,msg:'Invalid value for property json.category.name',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecRule &ARGS:json.name "@eq 0" "id:4210037,phase:2,block,msg:'Missing required property json.name',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecRule ARGS:json.name "!@rx ^.+$" "id:4210038,phase:2,block,msg:'Invalid value for property json.name',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecRule ARGS:/^json\.photoUrls\.(?:array_)?\d{1,9}$/ "!@rx ^.+$" "id:4210050,phase:2,block,msg:'Invalid value for property json.photoUrls',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecRule ARGS:/^json\.tags\.(?:array_)?\d{1,9}\.id$/ "!@rx ^[0-9]{1,19}$" "id:4210062,phase:2,block,msg:'Invalid value for property json.tags.0.id',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecRule ARGS:/^json\.tags\.(?:array_)?\d{1,9}\.name$/ "!@rx ^.+$" "id:4210074,phase:2,block,msg:'Invalid value for property json.tags.0.name',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecRule ARGS:json.status "!@rx ^(available|pending|sold)$" "id:4210086,phase:2,block,msg:'Invalid value for property json.status',log,auditlog,skipAfter:FAILED_API_CHECKS"
# Coraza implements @validateSchema for JSON Schema; ModSecurity3's is XSD-only,
# which is why the modsecurity3 flavor relies on the per-field rules above.
SecRule REQUEST_BODY "@validateSchema schema.json" "id:4200018,phase:2,block,msg:'JSON schema validation failed for addPet',log,auditlog,skipAfter:FAILED_API_CHECKS"
