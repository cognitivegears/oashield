
# postAnything: POST /anything
# Skip this operation if the request does not match the operation path.
# Path parameter validation patterns are embedded in the regex, so this rule
# both routes and validates path parameters (works on ModSecurity3 and Coraza).
SecRule REQUEST_FILENAME "!@rx ^/anything$" "id:4200002,phase:2,pass,nolog,skipAfter:END_postAnything"
# Skip this operation if the request method does not match the operation
SecRule REQUEST_METHOD "!@within POST" "id:4200003,phase:2,pass,nolog,skipAfter:END_postAnything"


# Reject unknown parameters: ARGS_NAMES holds query, form, and flattened JSON body
# names on both engines, so one allowlist covers them all.
SecRule ARGS_NAMES "!@rx ^(?:)$" "id:4200014,phase:2,block,msg:'Unknown parameter detected',log,auditlog,skipAfter:FAILED_API_CHECKS"

# Handle request bodies by declared media type

SecAction "id:4200025,phase:2,pass,nolog,skipAfter:AFTER_CONSUMES_postAnything"

# Declared consumes exist but the request Content-Type matched none of them
SecAction "id:4200021,log,auditlog,block,phase:2,msg:'Unexpected content type'"


SecMarker AFTER_CONSUMES_postAnything

## The request passed all checks
SecAction "phase:2,allow:request,id:4200022"

## End of checks for this operation
SecMarker END_postAnything

# postNote: POST /note
# Skip this operation if the request does not match the operation path.
# Path parameter validation patterns are embedded in the regex, so this rule
# both routes and validates path parameters (works on ModSecurity3 and Coraza).
SecRule REQUEST_FILENAME "!@rx ^/note$" "id:4200042,phase:2,pass,nolog,skipAfter:END_postNote"
# Skip this operation if the request method does not match the operation
SecRule REQUEST_METHOD "!@within POST" "id:4200043,phase:2,pass,nolog,skipAfter:END_postNote"


# Reject unknown parameters: ARGS_NAMES holds query, form, and flattened JSON body
# names on both engines, so one allowlist covers them all.
SecRule ARGS_NAMES "!@rx ^(?:json\.text)$" "id:4200054,phase:2,block,msg:'Unknown parameter detected',log,auditlog,skipAfter:FAILED_API_CHECKS"

# Handle request bodies by declared media type
# requestBody is optional (the OAS3 default): a request without a body skips body checks
SecRule &REQUEST_HEADERS:Content-Type "@eq 0" "id:4200066,phase:2,pass,nolog,skipAfter:AFTER_CONSUMES_postNote"
SecRule REQUEST_HEADERS:Content-Type "!@rx ^application/json" "id:4210041,phase:2,pass,nolog,skipAfter:ENDMEDIA_postNote_0"
# ModSecurity3 flags unparseable bodies here; Coraza does not set REQBODY_ERROR,
# but its @validateSchema rule below rejects malformed JSON instead.
SecRule REQBODY_ERROR "!@eq 0" "id:4210042,phase:2,block,msg:'Failed to parse request body',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecRule &ARGS:json.text "@eq 0" "id:4210045,phase:2,block,msg:'Missing required property json.text',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecRule ARGS:json.text "!@rx ^.+$" "id:4210046,phase:2,block,msg:'Invalid value for property json.text',log,auditlog,skipAfter:FAILED_API_CHECKS"
# Coraza implements @validateSchema for JSON Schema; ModSecurity3's is XSD-only,
# which is why the modsecurity3 flavor relies on the per-field rules above.
SecRule REQUEST_BODY "@validateSchema schema.json" "id:4210043,phase:2,block,msg:'JSON schema validation failed for postNote',log,auditlog,skipAfter:FAILED_API_CHECKS"
SecAction "id:4210044,phase:2,pass,nolog,skipAfter:AFTER_CONSUMES_postNote"

SecMarker ENDMEDIA_postNote_0


# Declared consumes exist but the request Content-Type matched none of them
SecAction "id:4200061,log,auditlog,block,phase:2,msg:'Unexpected content type'"


SecMarker AFTER_CONSUMES_postNote

## The request passed all checks
SecAction "phase:2,allow:request,id:4200062"

## End of checks for this operation
SecMarker END_postNote

