openapi: 3.1.0
info:
  title: OAS 3.1 numeric exclusive bounds
  version: "1.0"
paths:
  /items:
    get:
      operationId: listItems
      parameters:
        - name: count
          in: query
          schema:
            type: integer
            exclusiveMinimum: 0
            exclusiveMaximum: 100
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: ok
