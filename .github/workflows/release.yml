name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# contents: write: creates the GitHub release and pushes the version-bump commit
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    # The secrets context is not allowed in step `if:` expressions (the whole
    # workflow fails to parse); hoist the presence check into an env var.
    env:
      HAS_SIGNING_KEY: ${{ secrets.GPG_PRIVATE_KEY != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Maven
        run: mvn clean package -P build-cli-jar

      - name: Create release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            target/oashield-*.jar
            target/oashield-cli.jar

      # Publishing to a Maven repo is optional: it only runs when the signing
      # secret is configured. Without it, a release still produces the GitHub
      # Release and attached jars above.
      - name: Set up GPG
        if: env.HAS_SIGNING_KEY == 'true'
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --import-ownertrust

      - name: Deploy to Maven Central
        if: env.HAS_SIGNING_KEY == 'true'
        run: mvn deploy -P build-cli-jar -DskipTests --settings .github/maven-settings.xml

      - name: Update version in pom.xml
        run: |
          new_version=$(echo ${{ github.ref }} | sed 's/v//')
          mvn versions:set -DnewVersion=$new_version
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add pom.xml
          # pom may already be at the tagged version (bumped before tagging) — skip the commit if so
          git diff --staged --quiet || git commit -m "Update version to $new_version"
          git push origin HEAD:main
