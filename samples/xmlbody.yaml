openapi: 3.0.3
info:
  title: XML request bodies
  version: "1.0"
paths:
  /pets:
    post:
      operationId: createPet
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              $ref: '#/components/schemas/Pet'
      responses:
        "200":
          description: ok
components:
  schemas:
    Pet:
      type: object
      required: [name]
      xml:
        name: pet
      properties:
        id:
          type: integer
          format: int64
          xml:
            attribute: true
        name:
          type: string
          minLength: 1
          maxLength: 30
          pattern: '^[A-Za-z ]+$'
        status:
          type: string
          enum: [available, pending, sold]
        weight:
          type: number
          minimum: 0
        tags:
          type: array
          maxItems: 5
          xml:
            wrapped: true
          items:
            type: string
            xml:
              name: tag
